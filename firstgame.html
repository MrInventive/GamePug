<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volley — Peer-to-Peer Pong</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
  :root{
    --bg: #0b0e0c;
    --panel: #121611;
    --line: #2a3327;
    --ink: #d8e8d0;
    --dim: #6f8266;
    --amber: #e8a545;
    --p1: #7fd6a8;
    --p2: #e8a545;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; height:100%; background:var(--bg); color:var(--ink);
    font-family: 'Courier New', ui-monospace, monospace;
    overflow:hidden;
  }
  body{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; padding:16px;
  }
  .title{
    letter-spacing:0.4em; font-size:13px; color:var(--dim); text-transform:uppercase;
  }
  .title b{ color:var(--ink); letter-spacing:0.4em; }

  #lobby{
    background:var(--panel); border:1px solid var(--line); padding:28px 32px;
    display:flex; flex-direction:column; gap:16px; width:min(420px, 92vw);
  }
  .row{ display:flex; gap:8px; }
  input[type=text]{
    flex:1; background:#0e120e; border:1px solid var(--line); color:var(--ink);
    font-family:inherit; font-size:15px; padding:10px 12px; letter-spacing:0.1em;
  }
  input[type=text]:focus{ outline:none; border-color:var(--p1); }
  button{
    background:transparent; border:1px solid var(--dim); color:var(--ink);
    font-family:inherit; font-size:13px; letter-spacing:0.15em; text-transform:uppercase;
    padding:10px 14px; cursor:pointer; transition:border-color .15s, color .15s;
  }
  button:hover{ border-color:var(--p1); color:var(--p1); }
  button.primary{ border-color:var(--p1); color:var(--p1); }
  button.primary:hover{ background:var(--p1); color:#0b0e0c; }
  .hint{ font-size:12px; color:var(--dim); line-height:1.6; }
  .code{ color:var(--amber); letter-spacing:0.15em; }
  .divider{ border-top:1px dashed var(--line); margin:2px 0; }
  #status{ font-size:12px; color:var(--dim); min-height:16px; }

  #gameWrap{ display:none; flex-direction:column; align-items:center; gap:10px; }
  #gameWrap:fullscreen{
    background:var(--bg); justify-content:center; width:100vw; height:100vh; gap:16px;
  }
  #gameWrap:fullscreen canvas{ max-width:92vw; max-height:78vh; width:auto; }
  #hud{
    display:flex; justify-content:space-between; width:100%; font-size:13px;
    letter-spacing:0.15em; text-transform:uppercase;
  }
  #scoreYou{ color:var(--p1); }
  #scoreThem{ color:var(--p2); }
  canvas{ background:#0e120e; border:1px solid var(--line); touch-action:none; max-width:94vw; height:auto; }
  #footer{ font-size:11px; color:var(--dim); letter-spacing:0.08em; text-align:center; }
  #leaveBtn{ font-size:11px; padding:6px 10px; }

  @media (max-width: 480px){
    .title{ font-size:10px; letter-spacing:0.25em; }
    #lobby{ padding:20px 18px; }
    #hud{ font-size:11px; }
  }
</style>
</head>
<body>

  <div class="title"><b>VOLLEY</b> · peer-to-peer pong</div>

  <div id="lobby">
    <div>
      <button id="createBtn" class="primary" style="width:100%;">Create Game</button>
    </div>
    <div id="createdBox" style="display:none;">
      <div class="hint">Share this code with your opponent:</div>
      <div class="row">
        <input type="text" id="codeDisplay" readonly>
        <button id="copyBtn">Copy</button>
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="hint">Have a code? Join a game:</div>
      <div class="row">
        <input type="text" id="codeInput" placeholder="ENTER CODE" maxlength="6" autocomplete="off">
        <button id="joinBtn">Join</button>
      </div>
    </div>

    <div id="status"></div>
  </div>

  <div id="gameWrap">
    <div id="hud">
      <span id="scoreYou">YOU: 0</span>
      <span id="roleLabel"></span>
      <span id="scoreThem">THEM: 0</span>
    </div>
    <canvas id="canvas" width="700" height="440"></canvas>
    <div id="footer">↑ / ↓, mouse, or touch-drag to move · <button id="fullscreenBtn">Fullscreen</button> · <button id="leaveBtn">Leave Game</button></div>
  </div>

<script>
(function(){
  "use strict";

  // ---------- Config ----------
  const W = 700, H = 440;
  const PADDLE_W = 12, PADDLE_H = 90;
  const BALL_R = 7;
  const PADDLE_SPEED = 480; // px/sec
  const WIN_SCORE = 11;

  // ---------- DOM ----------
  const lobby = document.getElementById('lobby');
  const gameWrap = document.getElementById('gameWrap');
  const createBtn = document.getElementById('createBtn');
  const createdBox = document.getElementById('createdBox');
  const codeDisplay = document.getElementById('codeDisplay');
  const copyBtn = document.getElementById('copyBtn');
  const codeInput = document.getElementById('codeInput');
  const joinBtn = document.getElementById('joinBtn');
  const statusEl = document.getElementById('status');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const scoreYouEl = document.getElementById('scoreYou');
  const scoreThemEl = document.getElementById('scoreThem');
  const roleLabelEl = document.getElementById('roleLabel');
  const leaveBtn = document.getElementById('leaveBtn');
  const fullscreenBtn = document.getElementById('fullscreenBtn');

  fullscreenBtn.addEventListener('click', ()=>{
    if(!document.fullscreenElement){
      gameWrap.requestFullscreen().catch(()=>{
        setStatus('Fullscreen not supported on this device.');
      });
    } else {
      document.exitFullscreen();
    }
  });

  function setStatus(msg){ statusEl.textContent = msg; }

  // ---------- Peer setup ----------
  let peer = null;
  let conn = null;
  let isHost = false;

  function randomCode(){
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let s = '';
    for(let i=0;i<5;i++) s += chars[Math.floor(Math.random()*chars.length)];
    return s;
  }

  const ICE_CONFIG = {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
      {
        urls: 'turn:openrelay.metered.ca:80',
        username: 'openrelayproject',
        credential: 'openrelayproject'
      },
      {
        urls: 'turn:openrelay.metered.ca:443',
        username: 'openrelayproject',
        credential: 'openrelayproject'
      },
      {
        urls: 'turn:openrelay.metered.ca:443?transport=tcp',
        username: 'openrelayproject',
        credential: 'openrelayproject'
      }
    ]
  };

  function initPeerAsHost(){
    const code = randomCode();
    peer = new Peer('volley-' + code, { debug: 0, config: ICE_CONFIG });
    peer.on('open', ()=>{
      codeDisplay.value = code;
      createdBox.style.display = 'flex';
      createdBox.style.flexDirection = 'column';
      createdBox.style.gap = '8px';
      setStatus('Waiting for opponent to join…');
    });
    peer.on('connection', (c)=>{
      if(conn){ c.close(); return; } // already have an opponent
      conn = c;
      isHost = true;
      setupConnection();
    });
    peer.on('error', (err)=>{
      setStatus('Connection error: ' + err.type + '. Try again.');
    });
  }

  function joinGame(code){
    peer = new Peer(null, { debug: 0, config: ICE_CONFIG });
    peer.on('open', ()=>{
      setStatus('Connecting…');
      const c = peer.connect('volley-' + code.trim().toUpperCase(), { reliable:true });
      conn = c;
      isHost = false;
      setupConnection();
    });
    peer.on('error', (err)=>{
      if(err.type === 'peer-unavailable'){
        setStatus('No game found with that code.');
      } else {
        setStatus('Connection error: ' + err.type);
      }
    });
  }

  function setupConnection(){
    conn.on('open', ()=>{
      setStatus('Connected! Starting…');
      startGame();
    });
    conn.on('data', onData);
    conn.on('close', ()=>{
      setStatus('Opponent disconnected.');
      gameWrap.style.display = 'none';
      lobby.style.display = 'flex';
      resetLobbyToInitial();
    });
    conn.on('error', ()=>{
      setStatus('Connection lost.');
    });
  }

  function send(obj){
    if(conn && conn.open) conn.send(obj);
  }

  createBtn.addEventListener('click', ()=>{
    createBtn.disabled = true;
    initPeerAsHost();
  });

  copyBtn.addEventListener('click', ()=>{
    codeDisplay.select();
    document.execCommand('copy');
    copyBtn.textContent = 'Copied';
    setTimeout(()=> copyBtn.textContent = 'Copy', 1200);
  });

  joinBtn.addEventListener('click', ()=>{
    const code = codeInput.value.trim();
    if(!code) return;
    joinBtn.disabled = true;
    createBtn.disabled = true;
    joinGame(code);
  });

  function resetLobbyToInitial(){
    createBtn.disabled = false;
    joinBtn.disabled = false;
    createdBox.style.display = 'none';
    codeInput.value = '';
    if(peer){ peer.destroy(); peer = null; }
    conn = null;
  }

  leaveBtn.addEventListener('click', ()=>{
    if(conn) conn.close();
    if(peer) peer.destroy();
    peer = null; conn = null;
    gameWrap.style.display = 'none';
    lobby.style.display = 'flex';
    resetLobbyToInitial();
    setStatus('');
  });

  // ---------- Game state ----------
  // Host is authoritative for ball physics + scoring.
  // Both sides control their own paddle locally and send position to peer.
  let state = null;
  let myPaddleY = H/2 - PADDLE_H/2;
  let theirPaddleY = H/2 - PADDLE_H/2;
  let keys = { up:false, down:false };
  let lastTime = null;
  let rafId = null;

  function freshBall(direction){
    return {
      x: W/2, y: H/2,
      vx: 260 * direction,
      vy: (Math.random()*2-1) * 160
    };
  }

  function startGame(){
    lobby.style.display = 'none';
    gameWrap.style.display = 'flex';
    roleLabelEl.textContent = isHost ? 'HOST' : 'GUEST';

    myPaddleY = H/2 - PADDLE_H/2;
    theirPaddleY = H/2 - PADDLE_H/2;

    if(isHost){
      state = {
        ball: freshBall(Math.random() < 0.5 ? 1 : -1),
        scoreHost: 0,
        scoreGuest: 0
      };
    } else {
      state = null; // guest receives state from host
    }

    updateScoreDisplay();
    window.addEventListener('keydown', onKeyDown);
    window.addEventListener('keyup', onKeyUp);
    canvas.addEventListener('mousemove', onMouseMove);
    canvas.addEventListener('touchmove', onTouchMove, { passive:false });
    canvas.addEventListener('touchstart', onTouchMove, { passive:false });
    lastTime = performance.now();
    rafId = requestAnimationFrame(loop);
  }

  function updateScoreDisplay(){
    if(!state) return;
    const my = isHost ? state.scoreHost : state.scoreGuest;
    const their = isHost ? state.scoreGuest : state.scoreHost;
    scoreYouEl.textContent = 'YOU: ' + my;
    scoreThemEl.textContent = 'THEM: ' + their;
  }

  function onKeyDown(e){
    if(e.key === 'ArrowUp' || e.key === 'w'){ keys.up = true; e.preventDefault(); }
    if(e.key === 'ArrowDown' || e.key === 's'){ keys.down = true; e.preventDefault(); }
  }
  function onKeyUp(e){
    if(e.key === 'ArrowUp' || e.key === 'w') keys.up = false;
    if(e.key === 'ArrowDown' || e.key === 's') keys.down = false;
  }
  function onMouseMove(e){
    const rect = canvas.getBoundingClientRect();
    const scaleY = H / rect.height;
    const y = (e.clientY - rect.top) * scaleY;
    myPaddleY = Math.max(0, Math.min(H - PADDLE_H, y - PADDLE_H/2));
  }

  function onTouchMove(e){
    e.preventDefault();
    const touch = e.touches[0];
    if(!touch) return;
    const rect = canvas.getBoundingClientRect();
    const scaleY = H / rect.height;
    const y = (touch.clientY - rect.top) * scaleY;
    myPaddleY = Math.max(0, Math.min(H - PADDLE_H, y - PADDLE_H/2));
  }

  function onData(msg){
    if(msg.t === 'paddle'){
      theirPaddleY = msg.y;
    } else if(msg.t === 'state' && !isHost){
      state = msg.s;
      updateScoreDisplay();
    }
  }

  function loop(now){
    const dt = Math.min(0.032, (now - lastTime) / 1000);
    lastTime = now;

    // Local paddle movement from keys
    if(keys.up) myPaddleY -= PADDLE_SPEED * dt;
    if(keys.down) myPaddleY += PADDLE_SPEED * dt;
    myPaddleY = Math.max(0, Math.min(H - PADDLE_H, myPaddleY));

    send({ t:'paddle', y: myPaddleY });

    if(isHost && state){
      stepPhysics(dt);
      send({ t:'state', s: state });
      updateScoreDisplay();
    }

    render();
    rafId = requestAnimationFrame(loop);
  }

  function stepPhysics(dt){
    const b = state.ball;
    b.x += b.vx * dt;
    b.y += b.vy * dt;

    // top/bottom walls
    if(b.y - BALL_R < 0){ b.y = BALL_R; b.vy *= -1; }
    if(b.y + BALL_R > H){ b.y = H - BALL_R; b.vy *= -1; }

    // host paddle is left (x=24), guest paddle is right (x=W-24-PADDLE_W)
    const hostPaddleY = isHost ? myPaddleY : theirPaddleY;
    const guestPaddleY = isHost ? theirPaddleY : myPaddleY;

    const leftX = 24;
    const rightX = W - 24 - PADDLE_W;

    // left paddle collision
    if(b.vx < 0 && b.x - BALL_R < leftX + PADDLE_W && b.x - BALL_R > leftX - 20){
      if(b.y > hostPaddleY && b.y < hostPaddleY + PADDLE_H){
        b.x = leftX + PADDLE_W + BALL_R;
        b.vx *= -1.06;
        const hitPos = (b.y - (hostPaddleY + PADDLE_H/2)) / (PADDLE_H/2);
        b.vy += hitPos * 140;
      }
    }
    // right paddle collision
    if(b.vx > 0 && b.x + BALL_R > rightX && b.x + BALL_R < rightX + 20){
      if(b.y > guestPaddleY && b.y < guestPaddleY + PADDLE_H){
        b.x = rightX - BALL_R;
        b.vx *= -1.06;
        const hitPos = (b.y - (guestPaddleY + PADDLE_H/2)) / (PADDLE_H/2);
        b.vy += hitPos * 140;
      }
    }

    // scoring
    if(b.x < -20){
      state.scoreGuest += 1;
      state.ball = freshBall(1);
    } else if(b.x > W + 20){
      state.scoreHost += 1;
      state.ball = freshBall(-1);
    }

    // speed cap
    const speed = Math.hypot(b.vx, b.vy);
    const maxSpeed = 620;
    if(speed > maxSpeed){
      b.vx = b.vx / speed * maxSpeed;
      b.vy = b.vy / speed * maxSpeed;
    }
  }

  function render(){
    ctx.fillStyle = '#0e120e';
    ctx.fillRect(0,0,W,H);

    // center dashed line
    ctx.strokeStyle = '#2a3327';
    ctx.setLineDash([6,10]);
    ctx.beginPath();
    ctx.moveTo(W/2, 0);
    ctx.lineTo(W/2, H);
    ctx.stroke();
    ctx.setLineDash([]);

    const myColor = isHost ? '#7fd6a8' : '#e8a545';
    const theirColor = isHost ? '#e8a545' : '#7fd6a8';

    const hostPaddleY = isHost ? myPaddleY : theirPaddleY;
    const guestPaddleY = isHost ? theirPaddleY : myPaddleY;

    // left paddle (host)
    ctx.fillStyle = isHost ? myColor : theirColor;
    ctx.fillRect(24, hostPaddleY, PADDLE_W, PADDLE_H);

    // right paddle (guest)
    ctx.fillStyle = isHost ? theirColor : myColor;
    ctx.fillRect(W - 24 - PADDLE_W, guestPaddleY, PADDLE_W, PADDLE_H);

    // ball
    if(state && state.ball){
      ctx.fillStyle = '#d8e8d0';
      ctx.beginPath();
      ctx.arc(state.ball.x, state.ball.y, BALL_R, 0, Math.PI*2);
      ctx.fill();
    }

    // win banner
    if(state && (state.scoreHost >= WIN_SCORE || state.scoreGuest >= WIN_SCORE)){
      const iWon = isHost ? state.scoreHost >= WIN_SCORE : state.scoreGuest >= WIN_SCORE;
      ctx.fillStyle = 'rgba(11,14,12,0.85)';
      ctx.fillRect(0,0,W,H);
      ctx.fillStyle = iWon ? '#7fd6a8' : '#e8a545';
      ctx.font = '28px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText(iWon ? 'YOU WIN' : 'YOU LOSE', W/2, H/2);
      ctx.font = '13px Courier New';
      ctx.fillStyle = '#6f8266';
      ctx.fillText('Leave and create a new game to play again', W/2, H/2 + 32);
    }
  }

})();
</script>
</body>
</html>
